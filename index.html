<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edge Royale Prototype</title>
    <style>
      :root {
        --bg-1: #f2fbff;
        --bg-2: #c8e3ff;
        --bg-3: #9dc5ff;
        --ink: #1d2a49;
        --panel: rgba(255, 255, 255, 0.9);
        --blue: #3278ff;
        --red: #ef5e5e;
        --gold: #efc768;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(circle at top, var(--bg-1), transparent 44%),
          radial-gradient(circle at 80% 18%, rgba(255, 255, 255, 0.6), transparent 26%),
          linear-gradient(180deg, var(--bg-2), var(--bg-3));
        color: var(--ink);
        font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 10px 0;
      }

      .shell {
        width: min(1120px, 97vw);
        display: grid;
        gap: 10px;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 16px;
        padding: 9px 14px;
        box-shadow: 0 16px 32px rgba(27, 54, 104, 0.16);
        backdrop-filter: blur(10px);
      }

      .toolbar .meta {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .toolbar label {
        font-size: 12px;
        font-weight: 600;
      }

      #bot-tier-select {
        margin-left: 6px;
        border-radius: 10px;
        border: 1px solid #bad4ff;
        padding: 5px 7px;
        background: rgba(243, 247, 255, 0.95);
        color: var(--ink);
      }

      .toolbar h1 {
        margin: 0;
        font-size: 17px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .toolbar .actions {
        display: flex;
        gap: 8px;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 7px 11px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4), 0 8px 18px rgba(28, 49, 95, 0.12);
      }

      #start-btn {
        background: var(--blue);
        color: white;
      }

      #reset-btn {
        background: #dce7ff;
        color: var(--ink);
      }

      #train-btn {
        background: #efb94a;
        color: #1e2b44;
      }

      #profile-summary {
        font-size: 11px;
        color: #415173;
      }

      canvas {
        width: 100%;
        aspect-ratio: 16 / 10;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 24px 40px rgba(26, 49, 98, 0.22);
        background: #203651;
        touch-action: none;
      }

      canvas:fullscreen {
        width: 100vw;
        height: 100vh;
        aspect-ratio: auto;
        border-radius: 0;
      }

      canvas:-webkit-full-screen {
        width: 100vw;
        height: 100vh;
        aspect-ratio: auto;
        border-radius: 0;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div class="meta">
          <h1>Edge Royale</h1>
          <label for="bot-tier-select">
            Bot Level
            <select id="bot-tier-select" aria-label="Bot level"></select>
          </label>
        </div>
        <div class="actions">
          <button id="train-btn">Train Self Bot</button>
          <button id="start-btn">Start</button>
          <button id="reset-btn">Reset</button>
        </div>
        <div id="profile-summary" aria-live="polite"></div>
      </section>
      <canvas id="game" width="960" height="540" aria-label="Edge Royale Arena"></canvas>
    </main>
    <script type="module" src="./src/client/webGame.js"></script>
  </body>
</html>
