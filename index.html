<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edge Royale Prototype</title>
    <style>
      :root {
        --bg-1: #edf6ff;
        --bg-2: #d7e8ff;
        --ink: #1e2b44;
        --panel: #ffffff;
        --blue: #2573ff;
        --red: #ea4f4f;
        --gold: #efb94a;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at 20% 10%, var(--bg-1), var(--bg-2));
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      .shell {
        width: min(960px, 96vw);
        display: grid;
        gap: 10px;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        background: var(--panel);
        border-radius: 10px;
        padding: 10px 14px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      }

      .toolbar .meta {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .toolbar label {
        font-size: 13px;
        font-weight: 600;
      }

      #bot-tier-select {
        margin-left: 6px;
        border-radius: 6px;
        border: 1px solid #bbcbeb;
        padding: 6px 8px;
        background: #f3f7ff;
        color: var(--ink);
      }

      .toolbar h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .toolbar .actions {
        display: flex;
        gap: 8px;
      }

      button {
        border: none;
        border-radius: 8px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
      }

      #start-btn {
        background: var(--blue);
        color: white;
      }

      #reset-btn {
        background: #dce7ff;
        color: var(--ink);
      }

      #train-btn {
        background: #efb94a;
        color: #1e2b44;
      }

      #profile-summary {
        font-size: 12px;
        color: #415173;
      }

      canvas {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        box-shadow: 0 16px 28px rgba(0, 0, 0, 0.2);
        background: #203651;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div class="meta">
          <h1>Edge Royale</h1>
          <label for="bot-tier-select">
            Bot Level
            <select id="bot-tier-select" aria-label="Bot level"></select>
          </label>
        </div>
        <div class="actions">
          <button id="train-btn">Train Self Bot</button>
          <button id="start-btn">Start</button>
          <button id="reset-btn">Reset</button>
        </div>
        <div id="profile-summary" aria-live="polite"></div>
      </section>
      <canvas id="game" width="960" height="540" aria-label="Edge Royale Arena"></canvas>
    </main>
    <script type="module" src="./src/client/webGame.js"></script>
  </body>
</html>
