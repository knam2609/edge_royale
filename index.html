<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edge Royale Prototype</title>
    <style>
      :root {
        --sky-1: #e5f5bf;
        --sky-2: #a7d771;
        --grass-1: #557f3a;
        --grass-2: #2f4b24;
        --ink: #132033;
        --panel: rgba(13, 20, 32, 0.76);
        --panel-border: rgba(255, 255, 255, 0.18);
        --blue: #2d84ff;
        --gold: #f4c857;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(circle at top, var(--bg-1), transparent 44%),
          radial-gradient(circle at 80% 18%, rgba(255, 255, 255, 0.6), transparent 26%),
          linear-gradient(180deg, var(--bg-2), var(--bg-3));
        color: var(--ink);
        font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, var(--sky-1), transparent 36%),
          radial-gradient(circle at 50% 22%, rgba(255, 255, 255, 0.22), transparent 24%),
          linear-gradient(180deg, var(--sky-2), var(--grass-1) 58%, var(--grass-2));
        padding: 14px;
      }

      .shell {
        width: min(96vw, 640px);
      }

      .battle-shell {
        position: relative;
        width: min(96vw, calc(94vh * 0.5622));
        min-width: 300px;
      }

      .setup-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        align-content: start;
        justify-items: center;
        padding: 18px;
        pointer-events: none;
      }

      .setup-overlay[hidden] {
        display: none;
      }

      .setup-panel {
        width: min(100%, 360px);
        display: grid;
        gap: 12px;
        padding: 18px 18px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(20, 30, 46, 0.92), rgba(13, 18, 29, 0.84)),
          var(--panel);
        color: #edf4ff;
        box-shadow: 0 20px 40px rgba(7, 13, 20, 0.32);
        backdrop-filter: blur(10px);
        pointer-events: auto;
      }

      .setup-panel .eyebrow {
        margin: 0;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 244, 202, 0.82);
      }

      .setup-panel h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        line-height: 0.95;
      }

      .setup-panel .subtitle {
        margin: 0;
        font-size: 13px;
        line-height: 1.35;
        color: rgba(229, 240, 255, 0.78);
      }

      .setup-panel label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: rgba(238, 245, 255, 0.82);
      }

      #bot-tier-select {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.1);
        color: #f4f8ff;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      button {
        border: none;
        border-radius: 14px;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
        color: #11203b;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), 0 10px 18px rgba(4, 9, 16, 0.24);
      }

      #start-btn {
        background: linear-gradient(180deg, #4cc6ff, var(--blue));
        color: white;
      }

      #reset-btn {
        background: linear-gradient(180deg, #f4d7ab, #d6a66c);
      }

      #train-btn {
        background: linear-gradient(180deg, #ffe28a, var(--gold));
      }

      #profile-summary {
        min-height: 42px;
        font-size: 11px;
        line-height: 1.45;
        color: rgba(224, 234, 249, 0.85);
      }

      .setup-panel .hints {
        margin: 0;
        font-size: 11px;
        line-height: 1.45;
        color: rgba(214, 224, 240, 0.7);
      }

      canvas {
        display: block;
        width: 100%;
        aspect-ratio: 750 / 1334;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.32);
        box-shadow:
          0 30px 50px rgba(10, 20, 14, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        background: #70984d;
        touch-action: none;
      }

      canvas:fullscreen {
        width: 100vw;
        height: 100vh;
        aspect-ratio: auto;
        border-radius: 0;
      }

      canvas:-webkit-full-screen {
        width: 100vw;
        height: 100vh;
        aspect-ratio: auto;
        border-radius: 0;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="battle-shell">
        <canvas id="game" width="750" height="1334" aria-label="Edge Royale Arena"></canvas>
        <div class="setup-overlay" id="setup-overlay">
          <section class="setup-panel">
            <p class="eyebrow">Arena Setup</p>
            <h1 id="setup-title">Edge Royale</h1>
            <p class="subtitle" id="setup-subtitle">
              Portrait battle frame calibrated to the Clash Royale arena reference.
            </p>
            <label for="bot-tier-select">
              Bot Level
              <select id="bot-tier-select" aria-label="Bot level"></select>
            </label>
            <div class="actions">
              <button id="train-btn">Train</button>
              <button id="start-btn">Start</button>
              <button id="reset-btn">Reset</button>
            </div>
            <div id="profile-summary" aria-live="polite"></div>
            <p class="hints">Keys: `1-4` select, `space` pause, `r` reset, `f` fullscreen.</p>
          </section>
        </div>
      </section>
    </main>
    <script type="module" src="./src/client/webGame.js"></script>
  </body>
</html>
